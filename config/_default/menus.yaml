# Navigation Links
#   The weight parameter defines the order that the links will appear in.

main:
  - name: Home
    url: /
    weight: 10
  - name: Quick Start
    url: docs/getting-started/
    weight: 15
  - name: Documentation
    url: docs/
    weight: 20
  - name: Blog
    url: blog/
    weight: 30
  - name: Cookbook
    url: showcase/
    weight: 40
  - name: Community
    url: community/
    weight: 50
  - name: GitHub
    url: https://github.com/modelscope/twinkle
    weight: 60
    params:
      icon: github

sidebar:
  - identifier: more
    name: Need help?
    params:
      type: separator
    weight: 1
  - identifier: community
    name: "Community"
    # url matches main nav; avoids pageRef edge cases with multilingual + base path
    url: community/
    weight: 2
  - identifier: github
    name: "GitHub ↗"
    url: "https://github.com/modelscope/twinkle"
    weight: 3
